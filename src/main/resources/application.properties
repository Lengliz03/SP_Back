spring.application.name=stock

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/textile_stock?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=mySecretKeyForJwtTokenGenerationAndValidationPurposes12345678901234567890
jwt.expiration=86400000

# Server Configuration
server.port=8080
